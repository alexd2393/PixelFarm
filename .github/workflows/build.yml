name: Build Pixel Farm APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Download Gradle Wrapper JAR
        run: |
          curl -sL "https://github.com/gradle/gradle/raw/v7.5.0/gradle/wrapper/gradle-wrapper.jar" \
            -o PixelFarm/gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission
        run: chmod +x PixelFarm/gradlew

      - name: Build Debug APK
        run: cd PixelFarm && ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PixelFarm-APK
          path: PixelFarm/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
